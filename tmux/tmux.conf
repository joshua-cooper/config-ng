# Theme
set-hook -g client-light-theme {
	set -g @bg-primary "#faf9f8"
	set -g @bg-dim "#f4f2f1"
	set -g @bg-surface "#e8e5e3"
	set -g @bg-overlay "#dedad8"
	set -g @bg-selection "#c9cbd1"
	set -g @bg-match "#b5cbd2"

	set -g @fg-primary "#545464"
	set -g @fg-secondary "#8a8980"
	set -g @fg-dim "#b0afa8"
	set -g @fg-attention "#6f894e"

	set -g @border-primary "#d0d0d0"
	set -g @border-secondary "#909090"

	# Variable expansion isn't supported for these options.
	set -g cursor-colour "#2c363c"
	set -g prompt-cursor-colour "#2c363c"
	set -g display-panes-colour "#8a8980"
	set -g display-panes-active-colour "#545464"
}

set-hook -g client-dark-theme {
	set -g @bg-primary "#1c1917"
	set -g @bg-dim "#201e1c"
	set -g @bg-surface "#272523"
	set -g @bg-overlay "#2e2c2a"
	set -g @bg-selection "#223249"
	set -g @bg-match "#2d4f67"

	set -g @fg-primary "#c5c9c5"
	set -g @fg-secondary "#737c73"
	set -g @fg-dim "#3f433f"
	set -g @fg-attention "#87a987"

	set -g @border-primary "#2c2c2c"
	set -g @border-secondary "#625e5a"

	# Variable expansion isn't supported for these options.
	set -g cursor-colour "#c4cacf"
	set -g prompt-cursor-colour "#c4cacf"
	set -g display-panes-colour "#737c73"
	set -g display-panes-active-colour "#c5c9c5"
}

if -F "#{@bg-primary}" "" "set-hook -Rg client-dark-theme"

set -s command-alias[100] set-light-theme="set-hook -Rg client-light-theme"
set -s command-alias[101] set-dark-theme="set-hook -Rg client-dark-theme"

# Settings
set -g mouse on
set -g set-titles on
set -g set-clipboard on
set -g focus-events on
set -g renumber-windows on
set -g detach-on-destroy off
set -g base-index 1
set -g pane-base-index 1
set -g display-time 5000
set -g display-panes-time 5000
set -g history-limit 1000000
set -g main-pane-height 70%
set -g main-pane-width 70%
set -g update-environment "SSH_* DBUS_* XDG_* XCURSOR_* WAYLAND_DISPLAY \
NIRI_SOCKET"

# Status line
set -g status-position bottom
set -g status-style "bg=#{@bg-primary} fg=#{@fg-primary}"
set -g status-left ""
set -g status-left-length 50
set -g status-right "\
#{?#{!=:#{client_key_table},root},\
 #[fg=#{@fg-dim}]#{client_key_table},}"
set -g status-right-length 50
set -g window-status-separator " "
set -g window-status-format "\
#{?window_marked_flag,#[bold],}\
 #I #W "
set -g window-status-current-format "\
#{?window_marked_flag,#[bold],}\
 #I #W "
set -g window-status-style "bg=#{@bg-dim} fg=#{@fg-secondary}"
set -g window-status-current-style "bg=#{@bg-surface} fg=#{@fg-primary}"
set -g window-status-bell-style "fg=#{@fg-attention}"
set -g window-status-activity-style "fg=#{@fg-attention}"

# Command prompt
set -g status-keys vi
set -g cursor-style block
set -g prompt-cursor-style bar
set -g prompt-command-cursor-style block
set -g message-style "bg=#{@bg-primary} fg=#{@fg-primary}"
set -g message-command-style "bg=#{@bg-primary} fg=#{@fg-primary}"

# Panes
set -g pane-border-style "bg=#{@bg-primary} fg=#{@border-primary}"
set -g pane-active-border-style "bg=#{@bg-primary} fg=#{@border-secondary}"

# Windows
set -g window-style "bg=#{@bg-primary} fg=#{@fg-primary}"
set -g window-active-style "bg=#{@bg-primary} fg=#{@fg-primary}"

# Popup windows
set -g popup-border-lines single
set -g popup-style "bg=#{@bg-primary} fg=#{@fg-primary}"
set -g popup-border-style "bg=#{@bg-primary} fg=#{@border-secondary}"

# Menus
set -g menu-border-lines padded
set -g menu-style "bg=#{@bg-overlay} fg=#{@fg-primary}"
set -g menu-selected-style "bg=#{@bg-selection} fg=#{@fg-primary}"
set -g menu-border-style "bg=#{@bg-overlay} fg=#{@border-secondary}"

# Copy mode
set -g mode-keys vi
set -g mode-style "bg=#{@bg-surface} fg=#{@fg-primary}"
set -g copy-mode-selection-style "bg=#{@bg-selection} fg=#{@fg-primary}"
set -g copy-mode-match-style "bg=#{@bg-match} fg=#{@fg-primary}"
set -g copy-mode-current-match-style "bg=#{@bg-match} fg=#{@fg-primary} bold"
set -g copy-mode-mark-style "bg=#{@bg-surface} fg=#{@fg-primary}"
set -g copy-mode-position-format "\
#[align=right] \
#{t/p:top_line_time}\
#{?#{e|>:#{top_line_time},0}, ,}\
[#{scroll_position}/#{history_size}]\
#{?search_timed_out, (timed out),}\
#{?search_count, (#{search_count}#{?search_count_partial,+,} results),}\
 "
set -g copy-mode-position-style "bg=#{@bg-surface} fg=#{@fg-primary}"

# Choose tree
%hidden CHOOSE_TREE_SESSION_FORMAT="\
#{?session_alerts,#[fg=#{@fg-attention}],}\
#{?session_marked,#[bold],}\
#{session_windows} #{?#{==:#{session_windows},1},window,windows}\
#{?session_grouped, (group #{session_group}: #{session_group_list}),}\
#{?session_attached, (attached),}\
"

%hidden CHOOSE_TREE_WINDOW_FORMAT="\
#{?window_bell_flag,#[fg=#{@fg-attention}],}\
#{?window_activity_flag,#[fg=#{@fg-attention}],}\
#{?window_silence_flag,#[fg=#{@fg-attention}],}\
#{?window_marked_flag,#[bold],}\
#{window_name}\
#{?#{&&:#{==:#{window_panes},1},#{pane_title}},\
 #[fg=#{@fg-secondary}]#{pane_title}#[default],}\
"

%hidden CHOOSE_TREE_PANE_FORMAT="\
#{?pane_marked,#[bold],}\
#{pane_current_command}\
#{?pane_title, #[fg=#{@fg-secondary}]#{pane_title}#[default],}\
"

%hidden CHOOSE_TREE_FORMAT="\
#{?session_format,$CHOOSE_TREE_SESSION_FORMAT,}\
#{?window_format,$CHOOSE_TREE_WINDOW_FORMAT,}\
#{?pane_format,$CHOOSE_TREE_PANE_FORMAT,}\
"

# Keybinds
set -g prefix C-j
bind C-j send-prefix
unbind C-b

bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

bind b set -g status

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection
bind -T copy-mode-vi [ send-keys -X previous-prompt
bind -T copy-mode-vi ] send-keys -X next-prompt

bind s choose-tree -sZ -F "$CHOOSE_TREE_FORMAT"
bind w choose-tree -wZ -F "$CHOOSE_TREE_FORMAT"
