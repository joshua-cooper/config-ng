# Theme
set-hook -g client-light-theme {
	set -g @bg "#faf9f8"
	set -g @bg-status "#f0edec"
	set -g @bg-highlight "#e8e5e3"
	set -g @bg-float "#e5e2e0"
	set -g @bg-float-highlight "#dbd8d6"
	set -g @bg-selection "#c9cbd1"
	set -g @bg-match "#b5cbd2"
	set -g @fg "#545464"
	set -g @fg-secondary "#8a8980"
	set -g @fg-alert "#6f894e"
	set -g @border "#d0d0d0"
	set -g @border-active "#909090"

        # Needed to force a reload of these options.
	set -g window-style "bg=#{@bg} fg=#{@fg}"
	set -g window-active-style "bg=#{@bg} fg=#{@fg}"
}

set-hook -g client-dark-theme {
	set -g @bg "#1c1917"
	set -g @bg-status "#282727"
	set -g @bg-highlight "#393836"
	set -g @bg-float "#464442"
	set -g @bg-float-highlight "#565351"
	set -g @bg-selection "#223249"
	set -g @bg-match "#2d4f67"
	set -g @fg "#c5c9c5"
	set -g @fg-secondary "#737c73"
	set -g @fg-alert "#87a987"
	set -g @border "#2c2c2c"
	set -g @border-active "#625e5a"

        # Needed to force a reload of these options.
	set -g window-style "bg=#{@bg} fg=#{@fg}"
	set -g window-active-style "bg=#{@bg} fg=#{@fg}"
}

if -F "#{@bg}" "" "set-hook -Rg client-dark-theme"

# Settings
set -g mouse on
set -g set-titles on
set -g set-clipboard on
set -g focus-events on
set -g renumber-windows on
set -g detach-on-destroy off
set -g base-index 1
set -g pane-base-index 1
set -g history-limit 1000000
set -g main-pane-height 70%
set -g main-pane-width 70%
set -g update-environment "\
SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION \
WAYLAND_DISPLAY XDG_* XCURSOR_* NIRI_SOCKET"

# Command prompt
set -g status-keys vi
set -g cursor-style block
set -g prompt-cursor-style bar
# set -g prompt-command-cursor-style block
set -g message-style "bg=#{@bg-status} fg=#{@fg}"
set -g message-command-style "bg=#{@bg-status} fg=#{@fg}"

# Menus
set -g menu-border-lines padded
set -g menu-style "bg=#{@bg-float} fg=#{@fg}"
set -g menu-selected-style "bg=#{@bg-float-highlight} fg=#{@fg}"
set -g menu-border-style "bg=#{@bg-float} fg=#{@border-active}"

# Copy mode
set -g mode-keys vi
set -g mode-style "bg=#{@bg-highlight} fg=#{@fg}"
set -g copy-mode-selection-style "bg=#{@bg-selection} fg=#{@fg}"
set -g copy-mode-match-style "bg=#{@bg-match} fg=#{@fg}"
set -g copy-mode-current-match-style "bg=#{@bg-match} fg=#{@fg} bold"
set -g copy-mode-mark-style "bg=#{@bg-highlight} fg=#{@fg}"
set -g copy-mode-position-format "\
#[align=right] \
#{t/p:top_line_time}\
#{?#{e|>:#{top_line_time},0}, ,}\
[#{scroll_position}/#{history_size}]\
#{?search_timed_out, (timed out),}\
#{?search_count, (#{search_count}#{?search_count_partial,+,} results),}\
 "
set -g copy-mode-position-style "bg=#{@bg-highlight} fg=#{@fg}"

# Panes
set -g pane-border-style "bg=#{@bg} fg=#{@border}"
set -g pane-active-border-style "bg=#{@bg} fg=#{@border-active}"

# Windows
set -g window-style "bg=#{@bg} fg=#{@fg}"
set -g window-active-style "bg=#{@bg} fg=#{@fg}"

# Popup windows
set -g popup-border-lines single
set -g popup-style "bg=#{@bg} fg=#{@fg}"
set -g popup-border-style "bg=#{@bg} fg=#{@border-active}"

# Status line
set -g status-position top
set -g status-style "bg=#{@bg-status} fg=#{@fg}"
set -g status-left " "
set -g status-left-length 50
set -g status-right "#{?#{!=:#{client_key_table},root},[#{client_key_table}],} "
set -g status-right-length 50
set -g window-status-separator " "
set -g window-status-format "\
#{?window_marked_flag,#[bold],}\
#{?window_zoomed_flag,#[italics],}\
#I:#W"
set -g window-status-current-format "\
#{?window_marked_flag,#[bold],}\
#{?window_zoomed_flag,#[italics],}\
#I:#W"
set -g window-status-style "fg=#{@fg-secondary}"
set -g window-status-current-style "fg=#{@fg}"
set -g window-status-bell-style "fg=#{@fg-alert}"
set -g window-status-activity-style "fg=#{@fg-alert}"

# Choose tree
%hidden CHOOSE_TREE_SESSION_FORMAT="\
#{?session_alerts,#[fg=#{@fg-alert}],}\
#{?session_marked,#[bold],}\
#{session_windows} #{?#{==:#{session_windows},1},window,windows}\
#{?session_grouped, (group #{session_group}: #{session_group_list}),}\
#{?session_attached, (attached),}\
"

%hidden CHOOSE_TREE_WINDOW_FORMAT="\
#{?window_bell_flag,#[fg=#{@fg-alert}],}\
#{?window_activity_flag,#[fg=#{@fg-alert}],}\
#{?window_silence_flag,#[fg=#{@fg-alert}],}\
#{?window_marked_flag,#[bold],}\
#{window_name}\
#{?#{&&:#{==:#{window_panes},1},#{pane_title}},\
 #[fg=#{@fg-secondary}]#{pane_title}#[default],}\
"

%hidden CHOOSE_TREE_PANE_FORMAT="\
#{?pane_marked,#[bold],}\
#{pane_current_command}\
#{?pane_title, #[fg=#{@fg-secondary}]#{pane_title}#[default],}\
"

%hidden CHOOSE_TREE_FORMAT="\
#{?session_format,$CHOOSE_TREE_SESSION_FORMAT,}\
#{?window_format,$CHOOSE_TREE_WINDOW_FORMAT,}\
#{?pane_format,$CHOOSE_TREE_PANE_FORMAT,}\
"

# Keybinds
set -g prefix C-j
bind C-j send-prefix
unbind C-b

bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

bind b set -g status

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection
bind -T copy-mode-vi [ send-keys -X previous-prompt
bind -T copy-mode-vi ] send-keys -X next-prompt

bind s choose-tree -sZ -F "$CHOOSE_TREE_FORMAT"
bind w choose-tree -wZ -F "$CHOOSE_TREE_FORMAT"
